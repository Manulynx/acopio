{% extends 'base.html' %}

{% block title %}Eliminar Venta{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="card shadow mb-4">
        <div class="card-header py-3">
            <h6 class="m-0 font-weight-bold text-primary">Confirmar Eliminación</h6>
        </div>
        <div class="card-body">
            <p>¿Está seguro que desea eliminar la venta {{ venta.codigo }}?</p>
            <p>Esta acción no se puede deshacer.</p>
            
            <form method="post">
                {% csrf_token %}
                <a href="{% url 'ventas:venta_detail' venta.pk %}" class="btn btn-secondary">
                    <i class="fas fa-times"></i> Cancelar
                </a>
                <button type="submit" class="btn btn-danger">
                    <i class="fas fa-trash"></i> Eliminar
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
